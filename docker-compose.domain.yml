version: "3.9"

services:
  frontend:
    ports: []
    expose:
      - "80"

  caddy:
    image: caddy:2.9-alpine
    container_name: ncre-caddy
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
